<style>
  /* style variants */
  body.style-novel {
    background-image:
      radial-gradient(rgba(244,236,216,0.07) 1px, transparent 1.4px),
      radial-gradient(rgba(244,236,216,0.07) 1px, transparent 1.4px);
  }
  body.style-novel .panel { background: #2b2520; color: #f4ecd8; }
  body.style-novel .panel--paper { background: #2b2520; }
  body.style-novel .panel--inkbg { background: #f4ecd8; color: #0f0d0a; }

  body.style-novel .topnav nav a { color: #0f0d0a; }
  body.style-novel .bubble { background: #f4ecd8; color: #0f0d0a; }
  body.style-novel .placeholder-img { background: linear-gradient(135deg, #2b2520, #3a322a); }
  body.style-novel .placeholder-img > span { background: #1a1714; color: #f4ecd8; border-color: #f4ecd8; }
  body.style-novel .h-display { font-family: 'Bangers', 'Bowlby One', system-ui; }

  body.style-webtoon { background: #fafafa; }
  body.style-webtoon .panel { border-radius: 14px; box-shadow: 4px 4px 0 rgba(0,0,0,0.15); border-width: 2px; }
  body.style-webtoon .panel--inkbg { background: #1a1a2e; }
  body.style-webtoon .topnav { background: #1a1a2e; }

<!-- 手繪邊 SVG filter — 套用於所有 .panel -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="rough-edge" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="rough-edge-strong" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" seed="7" result="noise2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise2" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>
